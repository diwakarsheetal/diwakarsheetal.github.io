<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheetal — Photo Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #0e0e11;
    --bg2: #16161b;
    --card: #1c1c23;
    --border: #2a2a35;
    --fg: #eaeaf0;
    --muted: #7a7a8e;
    --accent: #e8553d;
    --accent-glow: rgba(232, 85, 61, 0.3);
    --accent2: #f0a830;
    --success: #34d399;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--fg);
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* Background atmosphere */
  body::before {
    content: '';
    position: fixed;
    top: -30%; left: -10%;
    width: 60vw; height: 60vw;
    background: radial-gradient(circle, rgba(232,85,61,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%; right: -10%;
    width: 50vw; height: 50vw;
    background: radial-gradient(circle, rgba(240,168,48,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    background: rgba(14,14,17,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #fff;
    box-shadow: 0 4px 20px var(--accent-glow);
    animation: logoPulse 3s ease-in-out infinite;
  }
  @keyframes logoPulse {
    0%,100% { box-shadow: 0 4px 20px var(--accent-glow); }
    50% { box-shadow: 0 4px 30px rgba(232,85,61,0.5); }
  }
  .logo-text {
    font-family: 'Playfair Display', serif;
    font-weight: 900; font-size: 22px;
    background: linear-gradient(135deg, var(--fg), var(--muted));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo-sub {
    font-size: 11px; color: var(--muted); font-weight: 400;
    letter-spacing: 2px; text-transform: uppercase;
  }
  .header-actions { display: flex; gap: 10px; }
  .btn {
    padding: 9px 18px; border: none; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.25s ease;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #d44a33);
    color: #fff;
    box-shadow: 0 4px 16px var(--accent-glow);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(232,85,61,0.5);
  }
  .btn-ghost {
    background: var(--card); color: var(--fg);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--border); }
  .btn-ghost.active { border-color: var(--accent); color: var(--accent); }

  /* Main layout */
  main {
    display: flex; height: calc(100vh - 63px);
    position: relative; z-index: 1;
  }

  /* Sidebar tools */
  .sidebar {
    width: 64px; min-width: 64px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center;
    padding: 16px 0; gap: 4px;
    overflow-y: auto;
  }
  .tool-btn {
    width: 44px; height: 44px;
    border: none; border-radius: 10px;
    background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; position: relative;
  }
  .tool-btn:hover { background: var(--card); color: var(--fg); }
  .tool-btn.active {
    background: rgba(232,85,61,0.12); color: var(--accent);
  }
  .tool-btn.active::before {
    content: '';
    position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 3px; height: 20px;
    background: var(--accent); border-radius: 0 3px 3px 0;
  }
  .tool-sep {
    width: 30px; height: 1px; background: var(--border); margin: 8px 0;
  }
  .tool-btn .tooltip {
    position: absolute; left: 56px; top: 50%; transform: translateY(-50%);
    background: var(--card); color: var(--fg); padding: 5px 10px;
    border-radius: 6px; font-size: 12px; white-space: nowrap;
    pointer-events: none; opacity: 0; transition: opacity 0.2s;
    border: 1px solid var(--border); z-index: 200;
  }
  .tool-btn:hover .tooltip { opacity: 1; }

  /* Canvas area */
  .canvas-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    background:
      radial-gradient(circle at 50% 50%, rgba(30,30,40,1) 0%, var(--bg) 100%);
  }
  .canvas-wrap {
    position: relative;
    box-shadow: 0 20px 80px rgba(0,0,0,0.5);
    border-radius: 4px;
    overflow: hidden;
    max-width: 90%; max-height: 90%;
  }
  #mainCanvas {
    display: block;
    max-width: 100%; max-height: calc(100vh - 120px);
    object-fit: contain;
  }
  .canvas-area .upload-prompt {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    animation: fadeUp 0.6s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .upload-icon {
    width: 120px; height: 120px;
    border: 2px dashed var(--border);
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; color: var(--muted);
    transition: all 0.3s;
    cursor: pointer;
  }
  .upload-icon:hover {
    border-color: var(--accent); color: var(--accent);
    background: rgba(232,85,61,0.05);
  }
  .upload-prompt h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px; font-weight: 700;
  }
  .upload-prompt p { color: var(--muted); font-size: 14px; }

  /* Right panel */
  .panel {
    width: 300px; min-width: 300px;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    overflow-y: auto; padding: 0;
  }
  .panel::-webkit-scrollbar { width: 4px; }
